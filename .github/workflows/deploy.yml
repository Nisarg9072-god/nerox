name: Nerox CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: nerox-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend syntax check
        run: python -m compileall nerox-backend/app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: nerox-frontend
        run: npm ci

      - name: Build frontend
        working-directory: nerox-frontend
        run: npm run build

      - name: Docker build backend
        run: docker build -t nerox-backend:ci ./nerox-backend

      - name: Docker build frontend
        run: docker build -t nerox-frontend:ci ./nerox-frontend

