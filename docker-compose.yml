version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./nerox-backend
    restart: unless-stopped
    env_file:
      - ./nerox-backend/.env
    depends_on:
      - mongo
      - redis
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 8s
      retries: 5
    volumes:
      - uploads_data:/app/storage/uploads
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./nerox-backend
    restart: unless-stopped
    command: python -m app.worker.worker
    env_file:
      - ./nerox-backend/.env
    depends_on:
      - redis
    # Backend image defines an HTTP healthcheck for port 8000, but the worker
    # doesn't run an HTTP server. Disable to avoid "unhealthy" noise.
    healthcheck:
      disable: true
    volumes:
      - uploads_data:/app/storage/uploads

  frontend:
    build:
      context: ./nerox-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
  uploads_data:

