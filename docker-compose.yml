version: "3.9"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./nerox-backend
    restart: unless-stopped
    env_file:
      - ./nerox-backend/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - uploads_data:/app/storage/uploads
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./nerox-backend
    restart: unless-stopped
    command: python -m app.worker.worker
    env_file:
      - ./nerox-backend/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - uploads_data:/app/storage/uploads

  frontend:
    build:
      context: ./nerox-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  mongo_data:
  uploads_data:

